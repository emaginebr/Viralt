services:
  viralt-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - viralt-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  viralt-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ViraltContext: Host=viralt-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      NAuth__ApiURL: ${NAUTH_API_URL:-http://nauth-api:80}
      NAuth__BucketName: ${NAUTH_BUCKET_NAME:-viralt}
      NAuth__JwtSecret: ${NAUTH_JWT_SECRET}
      zTools__ApiURL: ${ZTOOLS_API_URL:-http://ztools-api:80}
      BazzucaMedia__ApiKey: ${BazzucaMedia__ApiKey:-}
      Recaptcha__SiteKey: ${Recaptcha__SiteKey:-}
      Recaptcha__SecretKey: ${Recaptcha__SecretKey:-}
    depends_on:
      viralt-db:
        condition: service_healthy
    restart: unless-stopped

  viralt-app:
    build:
      context: ./viralt-app
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    depends_on:
      - viralt-api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - viralt-api
      - viralt-app
    restart: unless-stopped

volumes:
  viralt-pgdata:
