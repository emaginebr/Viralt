services:
  viralt-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - viralt-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  viralt-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ViraltContext: Host=viralt-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      NAuth__ApiURL: ${NAUTH_API_URL:-http://nauth-api:80}
      NAuth__BucketName: ${NAUTH_BUCKET_NAME:-viralt}
      NAuth__JwtSecret: ${NAUTH_JWT_SECRET}
      zTools__ApiURL: ${ZTOOLS_API_URL:-http://ztools-api:80}
      BazzucaMedia__ApiKey: ${BazzucaMedia__ApiKey:-}
      Recaptcha__SiteKey: ${Recaptcha__SiteKey:-}
      Recaptcha__SecretKey: ${Recaptcha__SecretKey:-}
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      viralt-db:
        condition: service_healthy

  viralt-app:
    build:
      context: ./viralt-app
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - viralt-api

volumes:
  viralt-pgdata:
